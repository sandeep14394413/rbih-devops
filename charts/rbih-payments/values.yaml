namespace: rbih-payments

gateway:
  replicaCount: 2
  image:
    repository: rbih-hiring/devops-challenge/payment-gateway
    tag: "1.0.0"
    pullPolicy: IfNotPresent
  service:
    port: 8080
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

processor:
  replicaCount: 2
  image:
    repository: rbih-hiring/devops-challenge/payment-processor
    tag: "1.0.0"
    pullPolicy: IfNotPresent
  service:
    port: 8080
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

ingress:
  enabled: true
  className: nginx
  host: payments.local
