---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-processor
  namespace: {{.Values.namespace}}
spec:
  replicas: {{.Values.processor.replicaCount}}
  selector:
    matchLabels:
      app: payment-processor
  template:
    metadata:
      labels:
        app: payment-processor
    spec:
      containers:
        - name: payment-processor
          image: >-
            {{.Values.processor.image.repository}}:
            {{.Values.processor.image.tag}}
          imagePullPolicy: {{.Values.processor.image.pullPolicy}}
          ports:
            - containerPort: {{.Values.processor.service.port}}
              name: http
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
---
apiVersion: v1
kind: Service
metadata:
  name: payment-processor
  namespace: {{.Values.namespace}}
spec:
  selector:
    app: payment-processor
  ports:
    - name: http
      port: {{.Values.processor.service.port}}
      targetPort: http
