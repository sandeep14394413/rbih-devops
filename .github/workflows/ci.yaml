name: CI
on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-kubectl@v4
      - uses: azure/setup-helm@v4
      - name: Install yamllint
        run: pipx install yamllint
      - name: Lint YAML
        run: yamllint .
      - name: Helm lint
        run: helm lint charts/rbih-payments
      - name: Render manifests
        run: helm template rbih-payments charts/rbih-payments > rendered.yaml
